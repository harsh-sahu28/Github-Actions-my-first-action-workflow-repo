# This is workflow name
name: Hello workflow

# runs on a trigger
on:
  workflow_dispatch:
#  push:
#    branches: [main]
#    paths:
#      - '**.html'
      
# these are jobs inside workflow
jobs:

  # this is the name of the job
  greet:
    # this is github runner, each job runs on a runner
    runs-on: ubuntu-latest
    steps:
      - name: say hello to users
        run: echo "Hello doston"
  
  # this is the name of the job
  details:
    runs-on: ubuntu-latest
    steps:
      - name: show what is the version of python,docker,etc
        run: docker --version && python --version
